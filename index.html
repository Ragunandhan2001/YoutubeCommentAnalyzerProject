<!DOCTYPE html>
<html>
<head>
<title>YouTube Comment Sentiment</title>

<style>
body{
font-family:Arial;
background:#222;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:500px;
text-align:center;
}

textarea{
width:100%;
height:120px;
padding:10px;
}

button{
padding:10px 20px;
margin-top:10px;
background:#ff0000;
color:white;
border:none;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h2>YouTube Comment Sentiment Analyzer</h2>

<textarea id="comment" placeholder="Paste YouTube comment here"></textarea>

<button onclick="analyze()">Analyze</button>

<div class="result" id="result"></div>

</div>

<script>

async function analyze(){

const text = document.getElementById("comment").value;

const response = await fetch("http://127.0.0.1:8000/analyze",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
text:text
})
});

const data = await response.json();

document.getElementById("result").innerHTML =
`Sentiment: ${data.sentiment}<br>
Confidence: ${data.confidence_percent}%`;
}

</script>

</body>
</html>
